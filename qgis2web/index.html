         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {

            }

        function pop_InlandWaterQualityMonitoring_5(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Scientific Services Code Name</th>\
                        <td class="visible-with-data" id="SCN_SRV_CODE_NAME">' + (feature.properties['SCN_SRV_CODE_NAME'] !== null ? autolinker.link(String(feature.properties['SCN_SRV_CODE_NAME']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Monitoring Type</th>\
                        <td class="visible-with-data" id="MNTR_TYPE">' + (feature.properties['MNTR_TYPE'] !== null ? autolinker.link(String(feature.properties['MNTR_TYPE']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });

            // Notify parent dashboard when a station marker is clicked
            layer.on('click', function() {
                window.parent.postMessage({
                    type: 'stationClick',
                    stationId:   feature.properties['SCN_SRV_CODE_NAME'],
                    stationName: feature.properties['SCN_SRV_CODE_NAME'],
                    location:    feature.properties['LCTN_DSCR']  || '',
                    catchment:   feature.properties['CTMT_CSTL']  || '',
                    monitorType: feature.properties['MNTR_TYPE']  || '',
                    waterType:   feature.properties['WTRB_TYPE']  || ''
                }, '*');
            });
        }

            onEachFeature: pop_InlandWaterQualityMonitoring_5,

                };
                return L.circleMarker(latlng, style_InlandWaterQualityMonitoring_5_0(feature));
            },function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_InlandWaterQualityMonitoring_5_1(feature));
            },
        ]});
        bounds_group.addLayer(layer_InlandWaterQualityMonitoring_5);

        var overlaysTree = [
            {label: '<img src="legend/InlandWaterQualityMonitoring_5.png" /> InlandWaterQualityMonitoring', layer: layer_InlandWaterQualityMonitoring_5},
            {label: '<img src="legend/IntegratedMainDrainage_4.png" /> IntegratedMainDrainage', layer: layer_IntegratedMainDrainage_4},
            {label: '<img src="legend/StormwaterOpenWatercourse_3.png" /> StormwaterOpenWatercourse', layer: layer_StormwaterOpenWatercourse_3},
            {label: '<img src="legend/StormwaterWaterbodies_2.png" /> StormwaterWaterbodies', layer: layer_StormwaterWaterbodies_2},
            {label: '<img src="legend/StormwaterDrainageCatchment_1.png" /> StormwaterDrainageCatchment', layer: layer_StormwaterDrainageCatchment_1},
            {label: "OpenStreetMap", layer: layer_OpenStreetMap_0, radioGroup: 'bm' },]
        var lay = L.control.layers.tree(null, overlaysTree,{
